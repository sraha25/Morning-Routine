<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Planner</title>
    <style>
        body { font-family: sans-serif; background: #fdfdfd; padding: 15px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 380px; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); border: 1px solid #eee; }
        h2 { margin: 0; font-size: 18px; color: #333; }
        .line { height: 3px; background: #FFD700; width: 40px; margin: 10px 0 20px 0; }
        .task { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #f9f9f9; }
        input[type="checkbox"] { width: 22px; height: 22px; margin-right: 15px; cursor: pointer; }
        label { font-size: 15px; color: #555; flex: 1; }
        .btn { width: 100%; padding: 15px; margin-top: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px; }
        .save { background: #4caf50; color: white; }
        .submit { background: #f44336; color: white; }
        #msg { text-align: center; margin-top: 15px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card" id="planner-ui">
    <h2 id="day-header">Daily Planner</h2>
    <div class="line"></div>
    
    <div id="task-list">
        <div class="task"><input type="checkbox"><label>Wake up 5.00 am</label></div>
        <div class="task"><input type="checkbox"><label>Drink 1 Glass Water</label></div>
        <div class="task"><input type="checkbox"><label>10 Min Meditation</label></div>
        <div class="task"><input type="checkbox"><label>10 Min Walk</label></div>
        <div class="task"><input type="checkbox"><label>Nut, Seeds Feed</label></div>
        <div class="task"><input type="checkbox"><label>Gk Read For 2 Hour</label></div>
        <div class="task"><input type="checkbox"><label>No Use Phone For 1 Hour</label></div>
    </div>

    <button class="btn save" onclick="saveData()">Save Progress</button>
    <button class="btn submit" onclick="endDay()">End Day (Lock)</button>
    <p id="msg"></p>
</div>

<script>
    // PASTE YOUR NEW URL HERE
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxgeI6YUSd3XZ-hofQqiDpWpLnpgHrm0Jldj0UyVi0cO3cmdXl9aFXId-erocLeEkxX/exec';
    
    const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
    let todayIndex = new Date().getDate();

    function setHeader() {
        document.getElementById('day-header').innerText = "Daily Planner: " + days[new Date().getDay()];
    }

    // Auto-refresh the page if the date changes
    setInterval(() => {
        if (new Date().getDate() !== todayIndex) {
            location.reload();
        }
    }, 30000);

    async function saveData() {
        const msg = document.getElementById('msg');
        msg.innerText = "Updating Google Sheet...";
        msg.style.color = "#888";

        const taskData = [];
        document.querySelectorAll('#task-list input').forEach(box => {
            taskData.push({ status: box.checked ? "Completed" : "Pending" });
        });

        try {
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ tasks: taskData })
            });
            msg.innerText = "✅ Successfully Updated!";
            msg.style.color = "green";
        } catch (e) {
            msg.innerText = "❌ Connection Error";
            msg.style.color = "red";
        }
    }

    function endDay() {
        if(confirm("Submit final tasks? The form will clear for tomorrow.")) {
            saveData();
            setTimeout(() => {
                document.getElementById('planner-ui').innerHTML = "<h3 style='text-align:center'>Day Finished!</h3><p style='text-align:center'>Your goals for today are logged. Rest well!</p>";
            }, 1000);
        }
    }

    setHeader();
</script>

</body>
</html>
